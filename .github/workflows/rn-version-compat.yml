name: TurboModule Patch Verification

on:
  pull_request:

jobs:
  turbomodule-patch-check:
    runs-on: macos-26-xlarge
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rn-version: [0.78.2, 0.79.6, 0.80.1, 0.81.5, 0.83.1]
    env:
      RCT_NEW_ARCH_ENABLED: 0

    steps:
      - name: Cancel previous jobs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # v0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Git Checkout
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Install SSH key
        uses: shimataro/ssh-key-action@d4fffb50872869abe2d9a9098a6d9c5aa7d16be4 # v2.7.0
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa_github_actions
          known_hosts: unnecessary

      - uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # 0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - uses: ruby/setup-ruby@44511735964dcb71245e7e55f72539531f7bc0eb # v1.257.0
        with:
          ruby-version: "2.7"
          bundler-cache: true

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Create Keys.ts
        shell: bash
        run: |
          echo "export const STRIPE_ACH_PUBLISHABLE_KEY = '${{ secrets.STRIPE_PUBLISHABLE_KEY }}'" > example/src/Keys.ts

      - name: Override React Native version
        run: |
          echo "Overriding React Native version to ${{ matrix.rn-version }}"
          jq ".dependencies[\"react-native\"] = \"${{ matrix.rn-version }}\"" example/package.json > tmp.json
          mv tmp.json example/package.json

      - name: Clean node_modules & lockfiles
        run: |
          rm -rf node_modules example/node_modules yarn.lock example/yarn.lock

      - name: Install dependencies
        run: yarn

      - name: pod install
        run: |
          yarn bootstrap

      - name: Compile without patch
        id: build_no_patch
        continue-on-error: true
        run: |
          yarn example build:ios:release
          bundle exec fastlane ios build_app_only
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          SOURCE_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Detect TurboModule error
        id: detect_error
        run: |
          if grep -q "UnsupportedModulePropertyParserError" <<< "${{ steps.build_no_patch.outcome }}"; then
            echo "needs_patch=true" >> $GITHUB_OUTPUT
          else
            echo "needs_patch=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply TurboModule patch
        if: steps.build_no_patch.outcome == 'failure'
        run: |
          patch -p0 < patches/turbomodule-codegen-fix.patch

      - name: Compile with patch
        if: steps.build_no_patch.outcome == 'failure'
        run: |
          yarn example build:ios:release
          bundle exec fastlane ios build_app_only
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
          SOURCE_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Report result
        run: |
          if [[ "${{ steps.build_no_patch.outcome }}" == "success" ]]; then
            RESULT="✅ Works without patch"
          else
            RESULT="🩹 Requires patch"
          fi

          echo "| RN Version | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.rn-version }} | $RESULT |" >> $GITHUB_STEP_SUMMARY
