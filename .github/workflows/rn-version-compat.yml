name: RN Compat Build

on:
  pull_request:

jobs:
  rn-compat-build-ios:
    runs-on: macos-26-xlarge
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rn-version: [0.79.6, 0.80.1, 0.81.1, 0.82.1, 0.83.1]

    steps:
      - name: Cancel previous jobs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # v0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Git Checkout
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
        with:
          path: primer-sdk

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Create fresh React Native app
        run: |
          npx @react-native-community/cli@latest init CompatTestApp --version ${{ matrix.rn-version }} --skip-git-init --skip-install --pm yarn

      - name: Add library dependency
        working-directory: CompatTestApp
        run: |
          yarn add ../primer-sdk

      - name: Install CocoaPods dependencies
        working-directory: CompatTestApp/ios
        run: |
          pod install

      - name: Build iOS
        working-directory: CompatTestApp/ios
        run: |
          xcodebuild -workspace CompatTestApp.xcworkspace \
            -scheme CompatTestApp \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build \
            CODE_SIGNING_ALLOWED=NO

  rn-compat-build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rn-version: [0.79.6, 0.80.1, 0.81.1, 0.82.1, 0.83.1]

    steps:
      - name: Cancel previous jobs
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # v0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          java-version: 17
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2

      - uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
        with:
          path: primer-sdk

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Create fresh React Native app
        run: |
          npx @react-native-community/cli@latest init CompatTestApp --version ${{ matrix.rn-version }} --skip-git-init --skip-install --pm yarn

      - name: Add library dependency
        working-directory: CompatTestApp
        run: |
          yarn add ../primer-sdk

      - name: Build Android
        working-directory: CompatTestApp/android
        run: |
          ./gradlew assembleRelease
