name: Sync Phrase Translations

on:
  workflow_dispatch:

jobs:
  sync-translations:
    name: Pull translations from Phrase and create PR
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_ACCESS_TOKEN }}

      - name: Install Phrase CLI
        uses: phrase/setup-cli@d1c415d0ff01efc1bb21287d60a547669d9331c5
        with:
          version: '2.35.5'

      - name: Generate Phrase config
        run: |
          echo "phrase:" > .phrase.yml
          echo "  access_token: ${PHRASE_ACCESS_KEY}" >> .phrase.yml
          echo "  project_id: ${PHRASE_PROJECT_ID}" >> .phrase.yml
          cat phrase_config.yml >> .phrase.yml
        env:
          PHRASE_ACCESS_KEY: ${{ secrets.PHRASE_ACCESS_KEY }}
          PHRASE_PROJECT_ID: ${{ secrets.PHRASE_PROJECT_ID_CHECKOUT_COMPONENTS }}

      - name: Pull translations from Phrase
        run: phrase pull

      - name: Remove Phrase config
        run: rm -f .phrase.yml

      - name: Check for changes
        run: |
          if git diff --quiet; then
            echo "No translation changes detected."
          else
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412
        with:
          token: ${{ secrets.RELEASE_ACCESS_TOKEN }}
          branch: chore/sync-phrase-translations
          title: "chore: sync translations from Phrase"
          commit-message: "chore: sync translations from Phrase"
          body: |
            Automated translation sync from Phrase.

            - Project: checkout-components
            - Format: simple_json
